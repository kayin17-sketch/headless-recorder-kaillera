# Ejemplo de configuración de servidores Kaillera

servidores:
  - id: "server1"
    name: "Servidor Local"
    host: "127.0.0.1"
    port: 27888
  
  - id: "server2"
    name: "Servidor de Pruebas"
    host: "192.168.1.100"
    port: 27888
  
  # Ejemplo de servidor público
